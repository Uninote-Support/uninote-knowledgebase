name: Translate JA to EN

on:
  push:
    branches: [main]
    paths:
      - 'ja/**.md'
  workflow_dispatch:
    inputs:
      translate_all:
        description: 'Translate all ja/ files (not just changed ones)'
        type: boolean
        default: true

jobs:
  translate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message || '', 'auto:')
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: pip install openai

      - name: Translate files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRANSLATE_ALL: ${{ github.event.inputs.translate_all || 'false' }}
        run: |
          python3 - << 'PYEOF'
          import os, sys, json, glob, time
          from openai import OpenAI

          client = OpenAI()

          TRANSLATE_ALL = os.environ.get("TRANSLATE_ALL", "false") == "true"

          # ── 変更されたja/ファイルを検出 ──
          if TRANSLATE_ALL:
              files = glob.glob("ja/*.md")
              print(f"Translate ALL: {len(files)} files")
          else:
              import subprocess
              result = subprocess.run(
                  ["git", "diff", "--name-only", "HEAD~1", "HEAD", "--", "ja/"],
                  capture_output=True, text=True
              )
              files = [f for f in result.stdout.strip().split("\n") if f.endswith(".md") and os.path.exists(f)]
              print(f"Changed files: {len(files)}")

          if not files:
              print("No ja/ files to translate.")
              sys.exit(0)

          os.makedirs("en", exist_ok=True)

          SYSTEM_PROMPT = """You are a professional translator for a SaaS product help center (Uninote).
          Translate the following Japanese markdown document to natural, professional English.

          Rules:
          - Preserve ALL markdown syntax exactly (headings, links, images, code blocks, frontmatter)
          - Translate the frontmatter 'title' and 'description' fields
          - For internal links: convert "/ja/..." paths to "/en/..." (e.g., "[link](/ja/foo)" → "[link](/en/foo)")
          - Do NOT translate external URLs (https://...), image paths, file paths, or code
          - Do NOT add or remove any content
          - Keep the same document structure
          - Use clear, concise technical English suitable for admin users
          - Product name "Uninote" should NOT be translated
          - Return ONLY the translated markdown, no explanations"""

          translated = 0
          failed = 0

          for filepath in files:
              fname = os.path.basename(filepath)
              en_path = os.path.join("en", fname)

              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      content = f.read()

                  if len(content.strip()) < 10:
                      print(f"  Skip (too short): {fname}")
                      continue

                  print(f"  [{translated+failed+1}/{len(files)}] Translating: {fname}...", end=" ", flush=True)

                  response = client.chat.completions.create(
                      model="gpt-4o-mini",
                      messages=[
                          {"role": "system", "content": SYSTEM_PROMPT},
                          {"role": "user", "content": content}
                      ],
                      temperature=0.3,
                      max_tokens=8192
                  )

                  translated_content = response.choices[0].message.content

                  # Clean up: remove ```markdown wrapper if present
                  if translated_content.startswith("```markdown"):
                      translated_content = translated_content[len("```markdown"):].strip()
                  if translated_content.startswith("```"):
                      translated_content = translated_content[3:].strip()
                  if translated_content.endswith("```"):
                      translated_content = translated_content[:-3].strip()

                  with open(en_path, "w", encoding="utf-8") as f:
                      f.write(translated_content + "\n")

                  translated += 1
                  print("OK")
                  time.sleep(1)

              except Exception as e:
                  failed += 1
                  print(f"FAILED: {e}")
                  time.sleep(5)

          print(f"\nDone: {translated} translated, {failed} failed")
          PYEOF

      - name: Mirror ja/ navigation structure to en/ in docs.json
        run: |
          python3 - << 'PYEOF'
          import os, json

          # Mintlify uses navigation.languages[].language structure
          # (not navigation.tabs[].tab). Mirror ja groups to en groups,
          # translating group names and including only files that exist.

          GROUP_MAP = {
              "ホーム": "Home",
              "スタートガイド": "Getting Started",
              "アカウント・ログイン": "Account & Login",
              "カレンダー・ミーティング": "Calendar & Meetings",
              "AI・フォーマット": "AI & Format",
              "プラン・請求": "Plan & Billing",
              "よくある質問": "FAQ",
              "WIPページ": "WIP Pages",
              "その他": "Other",
              "未分類": "Uncategorized",
          }

          with open("docs.json", "r", encoding="utf-8") as f:
              docs = json.load(f)

          languages = docs.get("navigation", {}).get("languages", [])
          ja_cfg = next((l for l in languages if l.get("language") == "ja"), None)
          en_cfg = next((l for l in languages if l.get("language") == "en"), None)

          if not ja_cfg or not en_cfg:
              print("Could not find both ja and en language configs")
              raise SystemExit(0)

          new_en_groups = []
          for ja_group in ja_cfg["groups"]:
              en_group_name = GROUP_MAP.get(ja_group["group"], ja_group["group"])
              en_pages = []
              for page in ja_group["pages"]:
                  en_page = page.replace("ja/", "en/", 1)
                  if os.path.exists(en_page + ".md") or os.path.exists(en_page + ".mdx"):
                      en_pages.append(en_page)
              if en_pages:
                  new_en_groups.append({"group": en_group_name, "pages": en_pages})

          en_cfg["groups"] = new_en_groups

          with open("docs.json", "w", encoding="utf-8") as f:
              json.dump(docs, f, ensure_ascii=False, indent=2)
              f.write("\n")

          total = sum(len(g["pages"]) for g in new_en_groups)
          print(f"Updated en nav: {len(new_en_groups)} groups, {total} pages")
          PYEOF

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ] || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto: translate ja/ to en/"
          git push
